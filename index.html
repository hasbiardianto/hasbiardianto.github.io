<!DOCTYPE html>

    <title>Document</title>
    <!-- Style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">

<body>

                        <span class="w-[30px] h-[2px] my-[5px] block bg-black transition duration-300 ease-in-out"></span>
                        <span class="w-[30px] h-[2px] my-[8px] block bg-black transition duration-300 ease-in-out origin-top-left"></span>
                    </button>

                    <nav id="nav-menu" class="hidden absolute py-5 bg-white shadow-lg rounded-lg max-w-[250px] w-full right-4 top-full lg:block lg:static lg:bg-transparent lg:max-w-full lg:shadow-none lg:rounded-none">

                            <li class="group ">
                                <a href="#" class="text-base text-black py-2 flex mx-8 group-hover:text-blue-500">About</a>

                            <li class="group ">
                                <a href="#" class="text-base text-black py-2 flex mx-8 group-hover:text-blue-500">Project</a>
                            </li>
                            <li class="group ">
                                <a href="#" class="text-base text-black py-2 flex mx-8 group-hover:text-blue-500">Contact</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </header>
    <!-- Navabar End -->

    <!-- Main Section Start-->
    <div class="h-screen flex flex-col items-center justify-center md:grid md:grid-cols-2">
        <div class="container mt-16 p-5 md:m-5 md:ml-14">    
            <h3 class="text-2xl text-center mb-1 md:text-left md:text-4xl md:m-2">Hi ! 👋 i am </h1>
            <h1 class="text-3xl font-bold text-center m-2 md:text-left md:text-6xl md:m-2">Hasbi Ardianto Pratama</h1>
            <h3 class="text-xl text-center mb-4 md:text-2xl md:text-left md:m-3">Under Graduate Computer Science</h2>
        </div>
        <div class="container flex md:grid items-center justify-center">    
            <img class="object-scale h-40 w-40 md:h-80 md:w-80" src="assets/image/avatar.png" alt="">
        </div>
    </div>
    <!-- Main Section End -->
    <script src="script.js"></script>

</html>
